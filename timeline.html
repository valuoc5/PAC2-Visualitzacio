<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Timeline - SpaceX</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    .timeline { position: relative; max-width: 800px; margin: auto; }
    .timeline-event { padding: 10px 40px; position: relative; background: #f0f0f0; border-radius: 6px; margin-bottom: 20px; }
    .timeline-event::after { content: ''; position: absolute; width: 12px; height: 12px; background: #007BFF; border-radius: 50%; left: -6px; top: 15px; }
    .timeline-date { font-weight: bold; margin-bottom: 5px; }
  </style>
</head>
<body>
  <h1>SpaceX Timeline</h1>
  <div class="timeline">
    <div class="timeline-event">
      <div class="timeline-date">2002</div>
      Fundació de SpaceX
    </div>
    <div class="timeline-event">
      <div class="timeline-date">2008</div>
      Llançament del Falcon 1
    </div>
    <div class="timeline-event">
      <div class="timeline-date">2012</div>
      Dragon arriba a l'ISS
    </div>
    <div class="timeline-event">
      <div class="timeline-date">2020</div>
      Llançament del Crew Dragon
    </div>
  </div>
</body>
</html>
